services:
  whatsapp-mcp:
    build: .
    container_name: whatsapp-mcp
    ports:
      # publish on host loopback only; the server binds 0.0.0.0 INSIDE the container
      # (MCP_HOST below) so Docker's published-port forward can reach it via eth0.
      - '127.0.0.1:${MCP_PORT:-8080}:8080'
    environment:
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PORT=8080
      # bind all interfaces in-container: a 127.0.0.1 bind isn't reachable through
      # Docker's published port (delivered to eth0), which silently breaks host access.
      - MCP_HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TIMEZONE=${TIMEZONE:-UTC}
      - MEDIA_AUTO_DOWNLOAD_ENABLED=${MEDIA_AUTO_DOWNLOAD_ENABLED:-true}
      - MEDIA_AUTO_DOWNLOAD_FROM_HISTORY=${MEDIA_AUTO_DOWNLOAD_FROM_HISTORY:-false}
      - MEDIA_AUTO_DOWNLOAD_MAX_SIZE_MB=${MEDIA_AUTO_DOWNLOAD_MAX_SIZE_MB:-10}
      - MEDIA_AUTO_DOWNLOAD_TYPES=${MEDIA_AUTO_DOWNLOAD_TYPES:-image,audio,sticker}
    volumes:
      # persist WhatsApp session and message database
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
